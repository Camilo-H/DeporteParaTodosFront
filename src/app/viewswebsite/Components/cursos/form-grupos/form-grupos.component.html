<button mat-icon-button class="close-button" matDialogClose style="float: right;">
  <mat-icon>close</mat-icon>
</button>

<mat-dialog-content class="dialog-content">
  <header class="title-two">{{ isEditing ? 'Editar grupo' : 'Registrar grupo' }}</header>

  <form (ngSubmit)="onSubmit(grupoForm)" #grupoForm="ngForm" class="form-content">
    <br>
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Categoria</mat-label>
      <input matInput [disabled]="true" placeholder="categoria" [(ngModel)]="categoriaGrupo" name="categoria">
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Deporte</mat-label>
      <input matInput [disabled]="true" placeholder="deporte" [(ngModel)]="cursoGrupo" name="deporte">
    </mat-form-field>

    <mat-form-field *ngIf="isEditing" appearance="outline" class="form-field">
      <mat-label>Año</mat-label>
      <input matInput [disabled]="true" placeholder="anio" [(ngModel)]="grupo.anio" name="anio">
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Cupos</mat-label>
      <input matInput placeholder="cupos" [(ngModel)]="grupo.cupos" name="cupos" type="number">
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Instructor</mat-label>
      <mat-select [(ngModel)]="grupo.idInstructor" name="instructor" placeholder="Instructor">
        <!-- BUG 1 FIX: backend devuelve estructura plana, no tiene .perfil anidado -->
        <mat-option *ngFor="let instr of instructores" [value]="instr.id">
          {{ instr.nombre }}
        </mat-option>
      </mat-select>
    </mat-form-field>


    <!-- BUG 2 FIX: bindear a variables Date del componente, no al string del DTO -->
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Fecha creación</mat-label>
      <input matInput [matDatepicker]="pickerInicio" [(ngModel)]="fechaCreacionDate" [matDatepickerFilter]="validarFechaCreacion" name="fechaInicio">
      <mat-datepicker-toggle matSuffix [for]="pickerInicio"></mat-datepicker-toggle>
      <mat-datepicker #pickerInicio></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Fecha cierre</mat-label>
      <input matInput [matDatepicker]="pickerFin" [(ngModel)]="fechaFinalizacionDate" [matDatepickerFilter]="validarFechaCierre" name="fechaFin">
      <mat-datepicker-toggle matSuffix [for]="pickerFin"></mat-datepicker-toggle>
      <mat-datepicker #pickerFin></mat-datepicker>
    </mat-form-field>

    <div class="form-field buttonImage">
      <input type="file" id="imagen" (change)="onFileSelected($event)" accept="image/*" required />
      <div *ngIf="imagenPreview" class="preview">
        <img [src]="imagenPreview" alt="Vista previa" class="image-preview">
      </div>
    </div>

    <div class="form-buttons">
      <button mat-button type="button" class="cancelar" (click)="onCancel()">Cancelar</button>
      <button mat-raised-button class="aceptar" type="submit">Aceptar</button>
      <!--<button mat-raised-button class="aceptar" type="submit">Aceptar</button>-->
    </div>
  </form>
</mat-dialog-content>
