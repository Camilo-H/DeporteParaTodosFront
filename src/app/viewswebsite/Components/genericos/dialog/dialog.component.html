<h2 mat-dialog-title>Confirmar eliminar el elemento</h2>
<mat-dialog-content>
  ¿Está seguro que desea eliminar {{data.elemento}} con el identificador {{ data.identificador}}?
</mat-dialog-content>
<mat-dialog-actions  align="end">
  <button mat-button mat-dialog-close class="btn-cerrar">Cancelar</button>
  <button mat-button (click)="confirmarEliminar()" class="btn-confirmar">Aceptar</button>
</mat-dialog-actions>
