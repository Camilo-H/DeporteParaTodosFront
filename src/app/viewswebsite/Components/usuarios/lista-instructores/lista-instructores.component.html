<app-sidenav>
  <div class="containerButons">
    <div class="row">
      <div class="col-lg-4 d-flex justify-content-center">
        <div class="col-lg-7">
          <select class="form-select" aria-label="Default select example">
            <option selected>Selecciona</option>
            <option value="1">Seleccionados</option>
            <option value="2">Semilleros</option>
            <option value="3">Recreativo</option>
          </select>
        </div>
      </div>
      <div class="col-lg-4 d-flex justify-content-center">
        <button class="btnAgregar" (click)="registroInstructor()">
          Agregar instructor +
        </button>
      </div>
    </div>
  </div>

  <div class="listado">
    <h2>Listado de instructores</h2>
    <div class="tabla-container">
      <table mat-table [dataSource]="instructores" class="mat-elevation-z8" matSort>
        <!-- Columna Código -->
        <ng-container matColumnDef="Identificacion">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Identificación</th>
          <td mat-cell *matCellDef="let instructor">{{ instructor.id }}</td>
        </ng-container>

        <!-- Columna Nombre -->
        <ng-container matColumnDef="Nombre">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
          <td mat-cell *matCellDef="let instructor">{{ instructor.nombre }}</td>
        </ng-container>

        <!-- Columna Correo -->
        <ng-container matColumnDef="Correo">
          <th mat-header-cell *matHeaderCellDef>Correo</th>
          <td mat-cell *matCellDef="let instructor">{{ instructor.correo }}</td>
        </ng-container>

        <ng-container matColumnDef="Acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let alumno">
            <button mat-icon-button color="primary">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- Header y celdas -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </div>
</app-sidenav>
