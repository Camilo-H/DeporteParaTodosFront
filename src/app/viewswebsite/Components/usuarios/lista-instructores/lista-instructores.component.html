<app-sidenav>
  <div class="containerButons">
    <div class="row">
      <div class="col-lg-4 d-flex justify-content-center">
        <div class="col-lg-7">
          <select class="form-select" aria-label="Default select example">
            <option selected>Selecciona</option>
            <option value="1">Seleccionados</option>
            <option value="2">Semilleros</option>
            <option value="3">Recreativo</option>
          </select>
        </div>
      </div>
      <div class="col-lg-4 d-flex justify-content-center">
        <button class="btnAgregar" (click)="registroInstructor()">
          Agregar instructor +
        </button>
      </div>
    </div>
  </div>

  <div class="deportistas">
    <mat-card>
      <mat-card-content>
        <div class="acciones">
          <h2>Instructores de programa</h2>
          <button mat-raised-button class="btnAgregar">
            <mat-icon>email</mat-icon> Notificación
          </button>
        </div>

        <table mat-table [dataSource]="deportistas" class="mat-elevation-z8">
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>
              Nombre completo de deportista
            </th>
            <td mat-cell *matCellDef="let deportista">
              {{ deportista.nombre }}
            </td>
          </ng-container>

          <ng-container matColumnDef="atenciones">
            <th mat-header-cell *matHeaderCellDef>Estado (Activo/Inactivo)</th>
            <td mat-cell *matCellDef="let deportista">
              <mat-checkbox [(ngModel)]="deportista.checked" (change)="onCheckboxChange($event)"></mat-checkbox>
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let deportista">
              <button mat-icon-button class="no-border">
                <mat-icon>email</mat-icon>
              </button>
              <button mat-icon-button class="no-border">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
        <div class="btnGuardar">
          <button mat-raised-button [disabled]="!isButtonEnabled" (click)="guardar()">
            Guardar
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</app-sidenav>
